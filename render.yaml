# ==========================================================
# Render Blueprint - Be.カラフル Well-being個別支援AI（無料構成）
#
# - API・フロントエンド: Render 無料プラン
#   （15分アクセスがないとスリープし、次回アクセス時に約1分かかります）
# - データベース: Neon（https://neon.tech）の無料PostgreSQLを使用
#   （Renderの無料DBは約1か月で削除されるため使いません）
#
# 手順: docs/deploy.md を参照
# ==========================================================

services:
  # ---- バックエンド API（FastAPI / Docker）----
  - type: web
    name: becolorful-api
    runtime: docker
    rootDir: backend
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true # Renderが安全なランダム値を自動生成
      - key: DATABASE_URL
        sync: false # Neonの接続文字列をダッシュボードで手入力
      - key: AI_PROVIDER
        value: mock # Gemini利用時はダッシュボードで gemini に変更
      - key: GEMINI_API_KEY
        sync: false # ダッシュボードで手入力（リポジトリに含めない）
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: CORS_ORIGINS
        value: https://becolorful-app.onrender.com
      - key: ADMIN_EMAIL
        sync: false # 初回起動時に作成される管理者のメールアドレス（手入力）
      - key: ADMIN_PASSWORD
        sync: false # 同パスワード（8文字以上・手入力）

  # ---- フロントエンド（React 静的サイト・無料）----
  - type: web
    name: becolorful-app
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      # /api へのアクセスをバックエンドへ転送
      - type: rewrite
        source: /api/*
        destination: https://becolorful-api.onrender.com/api/*
      # SPAルーティング
      - type: rewrite
        source: /*
        destination: /index.html
