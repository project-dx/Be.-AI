services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: becolorful
      POSTGRES_USER: becolorful
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-becolorful-dev}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U becolorful"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://becolorful:${POSTGRES_PASSWORD:-becolorful-dev}@db:5432/becolorful
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY を .env に設定してください}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db-data:
